<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man v2.5 - TEST v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
        }
        h1 { color: #FFFF00; font-size: 3rem; margin-bottom: 1rem; }
        .btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            background: #FFFF00;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0.5rem;
        }
        .btn:hover { transform: scale(1.05); }
        #output { margin-top: 2rem; color: #f00; font-size: 1.2rem; text-align: center; }
        #debug { margin-top: 1rem; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>🎮 PAC-MAN TEST v2</h1>
    <p style="color: #888; margin-bottom: 2rem;">Testing JavaScript without inline handlers</p>
    
    <button id="startBtn" class="btn">START GAME</button>
    
    <div id="output">Status: Loading...</div>
    <div id="debug"></div>

    <script>
        (function() {
            console.log('🔵 IIFE started');
            
            // Wait for DOM
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
            
            function init() {
                console.log('🔵 init() called');
                const btn = document.getElementById('startBtn');
                const output = document.getElementById('output');
                const debug = document.getElementById('debug');
                
                if (!btn) {
                    output.innerHTML = '❌ ERROR: Button not found!';
                    console.error('Button not found');
                    return;
                }
                
                debug.innerHTML = '✅ Script running | Time: ' + new Date().toLocaleTimeString();
                output.innerHTML = 'Status: Ready - Click the button!';
                output.style.color = '#00FF00';
                
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('🔵 Button click detected!');
                    output.innerHTML = '✅ Button works! ' + new Date().toLocaleTimeString();
                    setTimeout(() => {
                        output.innerHTML += '<br>🎮 Success!';
                    }, 500);
                });
                
                console.log('✅ Event listener attached');
            }
        })();
    </script>
</body>
</html>
