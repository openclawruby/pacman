<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man v2.5 - TEST VERSION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            color: #fff;
        }
        h1 { color: #FFFF00; font-size: 3rem; margin-bottom: 1rem; }
        .btn {
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            background: #FFFF00;
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 0.5rem;
        }
        .btn:hover { transform: scale(1.05); }
        #output { margin-top: 2rem; color: #0f0; font-size: 1.2rem; text-align: center; }
        #debug { margin-top: 1rem; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>🎮 PAC-MAN TEST</h1>
    <p style="color: #888; margin-bottom: 2rem;">Click the button to test if JavaScript works</p>
    
    <button class="btn" onclick="handleStart()">START GAME</button>
    
    <div id="output">Waiting for click...</div>
    <div id="debug"></div>

    <script>
        // Debug info
        const debug = document.getElementById('debug');
        debug.innerHTML = 'Script loaded at: ' + new Date().toLocaleTimeString();
        console.log('✅ Script loaded successfully');
        
        function handleStart() {
            console.log('🔵 Button clicked!');
            const output = document.getElementById('output');
            output.innerHTML = '✅ Button works! Function executed at: ' + new Date().toLocaleTimeString();
            output.style.color = '#00FF00';
            
            // Test DOM manipulation
            setTimeout(() => {
                output.innerHTML += '<br>🎮 Redirecting to game...';
            }, 1000);
        }
        
        // Test on load
        window.addEventListener('load', () => {
            console.log('✅ Page fully loaded');
            debug.innerHTML += '<br>Page loaded: ' + performance.now().toFixed(2) + 'ms';
        });
    </script>
</body>
</html>
